# ============================================================
# 智能服务台 Agent 微服务 — docker-compose.yml
# ============================================================
# 包含：Agent 服务 + Redis + RabbitMQ
# Milvus 使用嵌入式 milvus-lite，无需独立服务
# Celery Worker 独立部署，支持水平扩展
# 用于本地开发调试和准生产环境
# ============================================================

version: "3.8"

services:
  # ─────────────────────────────────────────
  # Redis（LangGraph Checkpointer + Celery Backend）
  # P0：多 Worker 共享状态
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oa-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --save 900 1 300 10 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ─────────────────────────────────────────
  # RabbitMQ（Celery Broker）
  # P1：消息队列，用于异步任务分发
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: oa-agent-rabbitmq
    ports:
      - "5672:5672"   # AMQP 协议端口
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=oagent
      - RABBITMQ_DEFAULT_PASS=change_me_in_production
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Celery Worker（异步任务执行器）
  # P1：独立部署，支持水平扩展
  # ─────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oa-agent-celery-worker
    command: celery -A tasks worker --loglevel=info --concurrency=4
    environment:
      # ─── 核心配置（必须）─────────────────
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - VLLM_API_KEY=not-needed
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
      - VLLM_REQUEST_TIMEOUT=60
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=amqp://oagent:change_me_in_production@rabbitmq:5672//
      # ─── Embedding 配置 ─────────────────────
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_BASE_URL=http://host.docker.internal:11434
      # ─── 日志配置 ─────────────────────────
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      # ─── 环境配置 ─────────────────────────
      - ENVIRONMENT=${ENVIRONMENT:-production}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─────────────────────────────────────────
  # OA Agent 服务（主应用 - FastAPI）
  # ─────────────────────────────────────────
  oa-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oa-agent
    ports:
      - "8000:8000"
    environment:
      # ─── 核心配置（必须）─────────────────
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - VLLM_API_KEY=not-needed
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
      - VLLM_REQUEST_TIMEOUT=30
      - VLLM_MAX_TOKENS=2000
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=amqp://oagent:change_me_in_production@rabbitmq:5672//
      - JAVA_BACKEND_BASE_URL=http://host.docker.internal:8000
      # ─── Embedding 配置 ─────────────────────
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_BASE_URL=http://host.docker.internal:11434
      # ─── 日志配置 ─────────────────────────
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      # ─── 环境配置 ─────────────────────────
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=false
      # ─── JWT 配置（生产必须修改）──────────
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      # ─── CORS 配置 ─────────────────────────
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  volumes:
  redis_data:
  rabbitmq_data: